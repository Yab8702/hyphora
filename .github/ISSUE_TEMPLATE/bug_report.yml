name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]

body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `hyphora init`
        2. Set mode to sdk
        3. Send a message on Telegram
        4. See error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste any relevant logs. They will be auto-formatted.
      render: shell

  - type: dropdown
    id: mode
    attributes:
      label: Agent mode
      options:
        - cli
        - sdk
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Hyphora version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.0.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
