name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why do you need it?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Include config examples if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought of?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Telegram
        - Discord
        - Twitter
        - Webhooks
        - Scheduler / Cron
        - Agent (SDK/CLI)
        - Memory
        - Config / Init
        - Other
